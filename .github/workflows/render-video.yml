name: Render Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Video job ID'
        required: true
        type: string
      slide_urls:
        description: 'JSON array of slide PNG URLs'
        required: true
        type: string
      voiceover_text:
        description: 'Full voiceover text (TTS done here with edge-tts)'
        required: false
        default: ''
        type: string
      scene_durations:
        description: 'JSON array of scene durations in seconds'
        required: true
        type: string
      music_type:
        description: 'Background music type'
        required: false
        default: 'cosmic_ambient'
        type: string
      webhook_url:
        description: 'Callback URL when render is complete'
        required: true
        type: string
      webhook_secret:
        description: 'Webhook auth secret'
        required: true
        type: string
      caption:
        description: 'TikTok caption for Telegram notification'
        required: false
        default: ''
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          ffmpeg -version | head -1
          pip3 install boto3 edge-tts -q
          echo "✅ Dependencies installed"

      - name: Create workspace
        run: mkdir -p /tmp/render/slides

      - name: Download slides
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request

          urls = json.loads(os.environ.get('SLIDE_URLS', '[]'))
          for i, url in enumerate(urls):
              print(f"Downloading slide {i+1}/{len(urls)}: {url[:80]}...")
              urllib.request.urlretrieve(url, f"/tmp/render/slides/slide_{i:02d}.png")
              print(f"  ✅ slide_{i:02d}.png")
          PYEOF
        env:
          SLIDE_URLS: ${{ inputs.slide_urls }}

      - name: Generate voiceover with edge-tts (free Microsoft Neural TTS)
        run: |
          VOICE_TEXT="${{ inputs.voiceover_text }}"

          if [ -z "$VOICE_TEXT" ]; then
            echo "No voiceover text — skipping TTS"
            exit 0
          fi

          echo "Generating Russian voiceover with edge-tts..."
          python3 - <<'PYEOF'
          import os, asyncio
          import edge_tts

          text = os.environ.get('VOICE_TEXT', '')
          if not text.strip():
              print("Empty text — skipping")
              exit(0)

          async def generate():
              # ru-RU-DmitryNeural — мужской голос
              # ru-RU-SvetlanaNeural — женский голос
              communicate = edge_tts.Communicate(text, voice="ru-RU-DmitryNeural", rate="+5%")
              await communicate.save("/tmp/render/voiceover.mp3")
              print("✅ Voiceover generated")

          asyncio.run(generate())
          PYEOF
        env:
          VOICE_TEXT: ${{ inputs.voiceover_text }}

      - name: Generate background music (cosmic ambient via ffmpeg)
        run: |
          DURATION=$(python3 -c "
          import json, os
          d = json.loads(os.environ.get('DURATIONS','[4,4,4,4,4,4]'))
          print(sum(d) + 5)
          ")
          echo "Total duration: ${DURATION}s — generating ambient music"

          # 528 Hz solfeggio + harmonics → cosmic ambient feel
          ffmpeg -y \
            -f lavfi -i "aevalsrc=0.10*sin(528*2*PI*t)+0.06*sin(1056*2*PI*t)+0.04*sin(396*2*PI*t):s=44100" \
            -f lavfi -i "aevalsrc=0.06*sin(174*2*PI*t)+0.04*sin(285*2*PI*t):s=44100" \
            -filter_complex "[0:a][1:a]amix=inputs=2:duration=first,\
              aecho=0.8:0.88:80:0.35,\
              aecho=0.8:0.88:150:0.25,\
              lowpass=f=1200,\
              volume=0.25,\
              afade=t=in:st=0:d=2,\
              afade=t=out:st=${DURATION}:d=4[music]" \
            -map "[music]" -t "$DURATION" \
            /tmp/render/music.mp3 2>/dev/null && echo "✅ Music generated" || echo "⚠️ Music generation failed (non-fatal)"
        env:
          DURATIONS: ${{ inputs.scene_durations }}

      - name: Build video from slides (Ken Burns effect)
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, glob

          durations = json.loads(os.environ.get('DURATIONS', '[4,4,4,4,4,4]'))
          slides = sorted(glob.glob('/tmp/render/slides/slide_*.png'))

          if not slides:
              print("ERROR: No slides found!")
              exit(1)

          print(f"Found {len(slides)} slides")
          while len(durations) < len(slides):
              durations.append(4)

          # Ken Burns zoom variants per slide
          zoom_configs = [
              "z='min(zoom+0.0003,1.05)'",  # slow zoom in
              "z='if(lte(zoom,1.0),1.05,max(1.0,zoom-0.0003))'",  # zoom out
              "z='min(zoom+0.0002,1.04)'",  # very slow zoom in
              "z='1.03'",  # slight zoom, stable
              "z='min(zoom+0.0004,1.06)'",  # faster zoom
              "z='if(lte(zoom,1.0),1.04,max(1.0,zoom-0.0002))'",  # gentle zoom out
          ]

          segments = []
          for i, (slide, dur) in enumerate(zip(slides, durations)):
              out = f'/tmp/render/seg_{i:02d}.mp4'
              frames = int(dur * 30)
              z_expr = zoom_configs[i % len(zoom_configs)]
              vf = (
                  f'scale=1080:1920:force_original_aspect_ratio=increase,'
                  f'crop=1080:1920,'
                  f"zoompan={z_expr}:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':d={frames}:s=1080x1920:fps=30"
              )
              cmd = [
                  'ffmpeg', '-y', '-loop', '1', '-i', slide,
                  '-vf', vf, '-t', str(dur),
                  '-c:v', 'libx264', '-preset', 'fast', '-crf', '22',
                  '-pix_fmt', 'yuv420p', '-an', out
              ]
              print(f"  Rendering segment {i+1}/{len(slides)}: {dur}s")
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"  ⚠️ Ken Burns failed, using static: {result.stderr[-200:]}")
                  cmd_simple = [
                      'ffmpeg', '-y', '-loop', '1', '-i', slide,
                      '-vf', 'scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920',
                      '-t', str(dur), '-c:v', 'libx264', '-preset', 'fast',
                      '-crf', '22', '-pix_fmt', 'yuv420p', '-an', out
                  ]
                  subprocess.run(cmd_simple, check=True)
              segments.append(out)
              print(f"  ✅ seg_{i:02d}.mp4")

          with open('/tmp/render/concat.txt', 'w') as f:
              for seg in segments:
                  f.write(f"file '{seg}'\n")

          subprocess.run([
              'ffmpeg', '-y', '-f', 'concat', '-safe', '0',
              '-i', '/tmp/render/concat.txt', '-c', 'copy',
              '/tmp/render/video_raw.mp4'
          ], check=True)
          print("✅ Segments concatenated")
          PYEOF
        env:
          DURATIONS: ${{ inputs.scene_durations }}

      - name: Mix audio (voiceover + background music)
        run: |
          HAVE_VOICE=$([ -f /tmp/render/voiceover.mp3 ] && echo "yes" || echo "no")
          HAVE_MUSIC=$([ -f /tmp/render/music.mp3 ] && echo "yes" || echo "no")
          echo "Voiceover: $HAVE_VOICE | Music: $HAVE_MUSIC"

          if [ "$HAVE_VOICE" = "yes" ] && [ "$HAVE_MUSIC" = "yes" ]; then
            ffmpeg -y \
              -i /tmp/render/video_raw.mp4 \
              -i /tmp/render/voiceover.mp3 \
              -i /tmp/render/music.mp3 \
              -filter_complex "[1:a]volume=1.0[v];[2:a]volume=0.18[m];[v][m]amix=inputs=2:duration=first:dropout_transition=2[a]" \
              -map "0:v" -map "[a]" -c:v copy -c:a aac -b:a 192k -shortest \
              /tmp/render/output.mp4 && echo "✅ Mixed: voice + music"
          elif [ "$HAVE_VOICE" = "yes" ]; then
            ffmpeg -y -i /tmp/render/video_raw.mp4 -i /tmp/render/voiceover.mp3 \
              -c:v copy -c:a aac -b:a 192k -shortest \
              /tmp/render/output.mp4 && echo "✅ Mixed: voice only"
          elif [ "$HAVE_MUSIC" = "yes" ]; then
            ffmpeg -y -i /tmp/render/video_raw.mp4 -i /tmp/render/music.mp3 \
              -filter_complex "[1:a]volume=0.4[a]" -map "0:v" -map "[a]" \
              -c:v copy -c:a aac -b:a 192k -shortest \
              /tmp/render/output.mp4 && echo "✅ Mixed: music only"
          else
            cp /tmp/render/video_raw.mp4 /tmp/render/output.mp4
            echo "⚠️ No audio — video only"
          fi

          ls -lh /tmp/render/output.mp4

      - name: Upload to Cloudflare R2
        run: |
          python3 - <<'PYEOF'
          import os, sys, boto3
          from botocore.config import Config

          account_id = os.environ.get('R2_ACCOUNT_ID', '')
          access_key = os.environ.get('R2_ACCESS_KEY_ID', '')
          secret_key = os.environ.get('R2_SECRET_ACCESS_KEY', '')
          bucket = os.environ.get('R2_BUCKET_NAME', 'yupsoul-videos')
          job_id = os.environ.get('JOB_ID', '')
          public_url_base = os.environ.get('R2_PUBLIC_URL', '').strip()

          if not all([account_id, access_key, secret_key]):
              print("⚠️ R2 credentials not set — storing locally")
              with open('/tmp/render/video_url.txt', 'w') as f:
                  f.write(f"local://output_{job_id}.mp4")
              sys.exit(0)

          s3 = boto3.client(
              's3',
              endpoint_url=f'https://{account_id}.r2.cloudflarestorage.com',
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              config=Config(signature_version='s3v4'),
              region_name='auto'
          )

          key = f'videos/{job_id}/output.mp4'
          print(f"Uploading {key} to R2...")
          with open('/tmp/render/output.mp4', 'rb') as f:
              s3.upload_fileobj(f, bucket, key, ExtraArgs={'ContentType': 'video/mp4'})

          if public_url_base:
              url = f"{public_url_base}/{key}"
          else:
              url = s3.generate_presigned_url(
                  'get_object',
                  Params={'Bucket': bucket, 'Key': key},
                  ExpiresIn=604800
              )

          print(f"✅ Uploaded: {url[:100]}...")
          with open('/tmp/render/video_url.txt', 'w') as f:
              f.write(url)
          PYEOF
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          JOB_ID: ${{ inputs.job_id }}

      - name: Send video to Telegram
        if: always()
        run: |
          BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Telegram not configured"
            exit 0
          fi

          if [ ! -f /tmp/render/output.mp4 ] || [ ! -s /tmp/render/output.mp4 ]; then
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"❌ Ошибка рендеринга (job: ${{ inputs.job_id }})\"}"
            exit 0
          fi

          CUSTOM_CAPTION="${{ inputs.caption }}"
          if [ -n "$CUSTOM_CAPTION" ]; then
            CAPTION="$CUSTOM_CAPTION"
          else
            CAPTION="🎬 Новое видео готово! #юпсол #астрология #yupsoul"
          fi

          echo "Sending video to Telegram (chat: ${CHAT_ID})..."
          RESULT=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendVideo" \
            -F "chat_id=${CHAT_ID}" \
            -F "video=@/tmp/render/output.mp4" \
            -F "caption=${CAPTION}" \
            -F "supports_streaming=true" \
            -F "width=1080" \
            -F "height=1920")

          TG_OK=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok'))" 2>/dev/null)
          if [ "$TG_OK" = "True" ]; then
            echo "✅ Video sent to Telegram"
          else
            echo "⚠️ Telegram send failed: $RESULT"
            # Fallback: send as document
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@/tmp/render/output.mp4" \
              -F "caption=${CAPTION}" || true
          fi

      - name: Notify webhook
        if: always()
        run: |
          VIDEO_URL=$(cat /tmp/render/video_url.txt 2>/dev/null || echo "")
          STATUS=$([ -f /tmp/render/output.mp4 ] && [ -s /tmp/render/output.mp4 ] && echo "done" || echo "failed")

          curl -s -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -H "X-Render-Secret: ${{ inputs.webhook_secret }}" \
            -d "{\"job_id\":\"${{ inputs.job_id }}\",\"status\":\"${STATUS}\",\"video_url\":\"${VIDEO_URL}\"}" \
            || echo "Webhook call failed (non-fatal)"
